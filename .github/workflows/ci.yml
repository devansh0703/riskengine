name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsqlite3-dev

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_TOOLS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Run Greeks Test
        run: ./build/test_greeks

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install -e ".[dev]"

      - name: Run Python tests
        run: |
          cd python
          python -m pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: [build-and-test, python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t riskengine:latest .
      - name: Test Docker image
        run: |
          docker run --rm riskengine:latest --help || true